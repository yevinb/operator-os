name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build for yevinb.github.io/operator-os
        working-directory: frontend
        run: |
          npm ci
          URL="${{ secrets.RAILWAY_API_URL }}"
          if [ -n "$URL" ]; then echo "{\"apiUrl\":\"$URL\"}" > public/api-config.json; fi
          npm run build:pages

      - name: Publish to docs/
        run: |
          rm -rf docs
          cp -R frontend/out docs
          touch docs/.nojekyll

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Deploy to yevinb.github.io/operator-os"
          git push
