name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Configure Railway API URL
        working-directory: frontend
        run: |
          URL="${{ secrets.RAILWAY_API_URL }}"
          if [ -n "$URL" ]; then
            echo "{\"apiUrl\":\"$URL\"}" > public/api-config.json
            echo "API URL configured from secret"
          else
            echo "No RAILWAY_API_URL secret — using api-config.json from repo"
          fi

      - name: Build static site
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /operator-os
          NEXT_PUBLIC_DEMO_MODE: "false"
          NEXT_PUBLIC_API_URL: ${{ secrets.RAILWAY_API_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

      - id: deployment
        uses: actions/deploy-pages@v4
